  <script>
    (function () {
      var grid = document.querySelector('.f-gallery-grid');
      if (!grid) return;

      var zoomIcon = '<div class=\"f-gal-zoom-icon\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"8\"/><path d=\"M21 21l-4.35-4.35\"/><path d=\"M11 8v6M8 11h6\"/></svg></div>';
      var fallbackSrc = '../assets/images/projects/defaultimg.jpg';

      function bindFallbacks() {
        document.querySelectorAll('.f-gallery-grid img').forEach(function (img) {
          img.addEventListener('error', function () {
            if (img.src.endsWith('/assets/images/projects/defaultimg.jpg')) return;
            img.src = fallbackSrc;
          });
        });
      }

      function activateImageLazyLoading() {
        var imgs = document.querySelectorAll('.f-gallery-grid img[data-src]');
        if (!imgs.length) return;

        var loadImage = function (img) {
          if (!img || img.dataset.loaded === '1') return;
          img.src = img.dataset.src;
          img.dataset.loaded = '1';
        };

        if (!('IntersectionObserver' in window)) {
          imgs.forEach(loadImage);
          return;
        }

        var observer = new IntersectionObserver(function (entries, obs) {
          entries.forEach(function (entry) {
            if (!entry.isIntersecting) return;
            loadImage(entry.target);
            obs.unobserve(entry.target);
          });
        }, {
          root: null,
          rootMargin: '600px 0px',
          threshold: 0.01
        });

        imgs.forEach(function (img) { observer.observe(img); });
      }

      function render(data) {
        var labelOverrides = (data && data.labelOverrides) || {};
        var galleryByFolder = (data && data.galleryByFolder) || {};
        var galleryItems = (data && data.galleryItems) || [];
        var html = '';

        if (galleryItems.length) {
          galleryItems.forEach(function (item) {
            var folder = item.folder;
            var file = item.file;
            var label = labelOverrides[folder] || folder;
            var src = '../assets/images/projects/' + folder + '/' + file;
            var alt = label + ' - FARJAR';
            html += '<div class=\"f-gal-item\">' +
              '<img data-src=\"' + src + '\" alt=\"' + alt + '\" loading=\"lazy\" decoding=\"async\" fetchpriority=\"low\">' +
              '<span class=\"f-gal-label\">' + label + '</span>' +
              zoomIcon +
            '</div>';
          });
        } else {
          Object.keys(galleryByFolder).forEach(function (folder) {
            var label = labelOverrides[folder] || folder;
            galleryByFolder[folder].forEach(function (file) {
              var src = '../assets/images/projects/' + folder + '/' + file;
              var alt = label + ' - FARJAR';
              html += '<div class=\"f-gal-item\">' +
                '<img data-src=\"' + src + '\" alt=\"' + alt + '\" loading=\"lazy\" decoding=\"async\" fetchpriority=\"low\">' +
                '<span class=\"f-gal-label\">' + label + '</span>' +
                zoomIcon +
              '</div>';
            });
          });
        }

        grid.innerHTML = html;
        bindFallbacks();
        activateImageLazyLoading();
      }

      render(window.GALLERY_IMAGES_DATA || { labelOverrides: {}, galleryByFolder: {} });
    })();
  </script>
